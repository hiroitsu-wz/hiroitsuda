<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taniの自己紹介</title>
    <style>
      /* ページ内移動をスルスルにする */
      html {
        scroll-behavior: smooth;
      }

      body {
        background-image: url(dot.png);
        overflow-x: hidden;
        margin: 0;
        padding-bottom: 50px;
      }

      /* 共通デザイン */
      p,
      ul,
      h2 {
        background-color: rgba(255, 255, 255, 0.85);
        color: #333;
        border: 2px solid #333;
        padding: 10px 30px;
        box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.1);
        display: inline-block;
        margin: 15px 20px;
        line-height: 1.6;
        vertical-align: middle;
      }
      p,
      ul {
        border-radius: 100px;
      }
      h2 {
        border-radius: 10px;
        color: rgba(54, 163, 116, 0.982);
      }
      h1 {
        background-color: rgba(137, 178, 254, 0.982);
        color: white;
        margin: 20px;
        padding: 10px;
        display: block;
      }
      h3 {
        background-color: rgb(148, 226, 177);
        color: white;
        margin: 20px;
        padding: 5px 15px;
      }
      ul {
        margin-left: 50px;
        list-style-position: inside;
      }
      a {
        margin: 10px 20px;
        display: inline-block;
        color: #1e90ff;
        text-decoration: none;
        font-weight: bold;
      }
      .red {
        color: red;
        font-weight: bold;
      }

      /* スライドショー設定 */
      .slideshow-container {
        width: 100%;
        position: relative;
        overflow: hidden;
        margin-bottom: 30px;
        height: 60vh;
      }
      @media screen and (max-width: 768px) {
        .slideshow-container {
          height: 40vh;
        }
      }

      .slides-wrapper {
        display: flex;
        width: 400%; /* 写真4枚なので400% */
        height: 100%;
        transition: transform 1s ease-in-out;
      }

      .mySlides {
        width: 25%; /* 4枚なので1枚あたり25% */
        height: 100%;
        flex-shrink: 0;
      }

      .mySlides img {
        width: 100%;
        height: 100%;
        object-fit: cover; /* PC・スマホ両対応で見栄え良く */
        display: block;
      }

      .prev-btn,
      .next-btn {
        cursor: pointer;
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        padding: 16px;
        color: white;
        font-size: 24px;
        background-color: rgba(0, 0, 0, 0.3);
        z-index: 10;
        margin: 0;
      }
      .next-btn {
        right: 10px;
      }
      .prev-btn {
        left: 10px;
      }

      .dot-container {
        text-align: center;
        position: absolute;
        bottom: 15px;
        width: 100%;
        z-index: 15;
      }
      .dot {
        cursor: pointer;
        height: 12px;
        width: 12px;
        margin: 0 5px;
        background-color: rgba(255, 255, 255, 0.5);
        border-radius: 50%;
        display: inline-block;
      }
      .dot.active {
        background-color: white;
      }

      /* Instagramリンク用の設定 */
      .mySlides a {
        display: block;
        width: 100%;
        height: 100%;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="slideshow-container">
      <div class="slides-wrapper" id="slidesWrapper">
        <div class="mySlides">
          <a
            href="https://www.instagram.com/tani_the_world"
            target="_blank"
            rel="noopener"
          >
            <img src="Instagram.png" alt="スライド1" style="cursor: pointer" />
          </a>
        </div>
        <div class="mySlides"><img src="img2.jpg" alt="スライド2" /></div>
        <div class="mySlides"><img src="img3.jpg" alt="スライド3" /></div>
        <div class="mySlides"><img src="img4.jpg" alt="スライド4" /></div>
      </div>

      <a class="prev-btn" onclick="plusSlides(-1)">&#10094;</a>
      <a class="next-btn" onclick="plusSlides(1)">&#10095;</a>

      <div class="dot-container">
        <span class="dot" onclick="currentSlide(1)"></span>
        <span class="dot" onclick="currentSlide(2)"></span>
        <span class="dot" onclick="currentSlide(3)"></span>
        <span class="dot" onclick="currentSlide(4)"></span>
      </div>
    </div>

    <a href="page2.html">お問い合わせはこちら</a>

    <h1>自己紹介</h1>
    <p>
      はじめまして。Taniです。<br />
      日々、WEB作成を学びながらこのサイトもよりよくしていきます。<br />
      TANI THE WORLD全開で人生楽しんでいきます。
    </p>

    <script>
      let slideIndex = 1;
      let slideTimer;
      const autoPlayDelay = 5000;

      showSlides(slideIndex);
      startAutoPlay();

      function startAutoPlay() {
        slideTimer = setInterval(() => {
          plusSlides(1);
        }, autoPlayDelay);
      }

      function plusSlides(n) {
        showSlides((slideIndex += n));
      }
      function currentSlide(n) {
        showSlides((slideIndex = n));
      }

      function showSlides(n) {
        const wrapper = document.getElementById("slidesWrapper");
        const slides = document.getElementsByClassName("mySlides");
        const dots = document.getElementsByClassName("dot");

        if (n > slides.length) {
          slideIndex = 1;
        }
        if (n < 1) {
          slideIndex = slides.length;
        }

        const translateValue = -(slideIndex - 1) * 100;
        wrapper.style.transform = `translateX(${translateValue}%)`;

        for (let i = 0; i < dots.length; i++) {
          dots[i].className = dots[i].className.replace(" active", "");
        }
        dots[slideIndex - 1].className += " active";
        resetTimer();
      }

      function resetTimer() {
        clearInterval(slideTimer);
        startAutoPlay();
      }

      // バスケやふわっと表示のJSはそのまま下に続けてください
      window.addEventListener("DOMContentLoaded", () => {
        // ...（既存のふわっと表示やバスケ演出のコード）...
      });
    </script>
  </body>
</html>
