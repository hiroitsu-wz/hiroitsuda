<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>PUYOichi PRO - Standard</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #0f172a;
        touch-action: none;
      }
      body {
        color: white;
        font-family: "Segoe UI", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .moon {
        position: absolute;
        width: 400px;
        height: 200px;
        filter: blur(60px);
        z-index: -1;
        opacity: 0.2;
        border-radius: 50%;
      }
      .moon-upper {
        top: -50px;
        right: -100px;
        background: linear-gradient(to bottom, #38bdf8, #818cf8);
      }
      .header-area {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 90%;
        margin-top: 10px;
        z-index: 10;
      }
      .info {
        font-size: 20px;
        font-weight: 800;
        color: #38bdf8;
      }

      #overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(15, 23, 42, 0.95);
        z-index: 100;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .modal {
        background: #1e293b;
        padding: 25px;
        border-radius: 20px;
        border: 2px solid #334155;
        width: 85%;
        max-width: 300px;
        text-align: center;
      }
      input {
        padding: 12px;
        font-size: 16px;
        margin: 8px 0;
        width: 90%;
        background: #0f172a;
        color: white;
        border: 1px solid #334155;
        border-radius: 8px;
      }

      /* スタートボタン専用のスタイル */
      .big-btn {
        margin-top: 15px;
        width: 100%;
        background: #3b82f6;
        color: white;
        border: none;
        padding: 15px;
        border-radius: 8px;
        font-weight: bold;
        font-size: 18px;
        cursor: pointer;
      }
      .big-btn:active {
        background: #2563eb;
        transform: scale(0.98);
      }

      .game-container {
        position: relative;
        display: flex;
        gap: 10px;
        margin-top: 5px;
      }
      canvas {
        background: rgba(30, 41, 59, 0.95);
        border: 3px solid #475569;
        border-radius: 12px;
        max-height: 50vh;
        width: auto;
      }
      #next-canvas {
        background: rgba(30, 41, 59, 0.5);
        border: 2px solid #475569;
        border-radius: 8px;
        align-self: flex-start;
      }

      #chain-msg {
        position: absolute;
        top: 15%;
        left: 50%;
        transform: translateX(-50%);
        color: #facc15;
        font-size: 32px;
        font-weight: 900;
        pointer-events: none;
        text-shadow: 2px 2px 0 #000;
        z-index: 50;
        text-align: center;
      }

      .controller {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        width: 90%;
        max-width: 320px;
        margin-top: 10px;
      }
      .ctrl-btn {
        background: #334155;
        border: none;
        border-radius: 12px;
        color: white;
        font-size: 24px;
        padding: 15px 0;
        touch-action: none;
        user-select: none;
      }
      .ctrl-btn:active {
        background: #475569;
        transform: scale(0.95);
      }
      .btn-rotate {
        background: #8b5cf6;
      }
      .btn-drop {
        background: #3b82f6;
        grid-column: span 3;
        padding: 10px 0;
        font-size: 16px;
        font-weight: bold;
      }

      .system-btns {
        display: flex;
        gap: 8px;
        margin-top: 8px;
      }
      .sys-btn {
        padding: 6px 12px;
        font-size: 12px;
        border-radius: 5px;
        border: none;
        color: white;
        background: #475569;
      }
      .hidden {
        display: none !important;
      }
      table {
        width: 100%;
        margin-top: 10px;
        border-collapse: collapse;
        font-size: 12px;
      }
      th,
      td {
        padding: 6px;
        border-bottom: 1px solid #334155;
      }
      .highlight {
        color: #facc15;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="moon moon-upper"></div>

    <div id="overlay">
      <div id="login-modal" class="modal">
        <h2 style="margin: 0 0 10px 0">Login</h2>
        <input
          type="text"
          id="nickname"
          placeholder="ニックネーム"
          maxlength="10"
        />
        <input
          type="password"
          id="userPass"
          placeholder="合言葉"
          maxlength="10"
        />
        <button id="loginBtn" class="big-btn">LOGIN</button>
      </div>

      <div id="start-modal" class="modal hidden">
        <h2 style="margin: 0 0 5px 0">READY?</h2>
        <p id="player-display" style="color: #38bdf8; margin-bottom: 15px"></p>
        <button id="playBtn" class="big-btn">GAME START</button>
      </div>

      <div id="rank-modal" class="modal hidden">
        <h2 style="margin: 0 0 10px 0">Rankings</h2>
        <div id="rank-list"></div>
        <button
          id="backBtn"
          class="big-btn"
          style="background: #475569; font-size: 14px"
        >
          CLOSE
        </button>
      </div>
    </div>

    <div class="header-area">
      <h1>PUYOichi PRO</h1>
      <div class="info">SCORE: <span id="score">0</span></div>
    </div>

    <div id="chain-msg"></div>
    <div class="game-container">
      <canvas id="game" width="240" height="480"></canvas>
      <div style="display: flex; flex-direction: column; align-items: center">
        <span style="font-size: 10px; margin-bottom: 2px; font-weight: bold"
          >NEXT</span
        >
        <canvas id="next-canvas" width="60" height="100"></canvas>
      </div>
    </div>

    <div class="controller">
      <button class="ctrl-btn" id="m-left">←</button>
      <button class="ctrl-btn btn-rotate" id="m-rotate">↻</button>
      <button class="ctrl-btn" id="m-right">→</button>
      <button class="ctrl-btn btn-drop" id="m-down">QUICK DROP</button>
    </div>

    <div class="system-btns">
      <button class="sys-btn" id="pauseBtn">Pause</button>
      <button class="sys-btn" id="showRankBtn" style="background: #8b5cf6">
        Rank
      </button>
      <button class="sys-btn" id="resetBtn" style="background: #ef4444">
        Reset
      </button>
    </div>

    <script>
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      const nextCanvas = document.getElementById("next-canvas");
      const nextCtx = nextCanvas.getContext("2d");
      const scoreElement = document.getElementById("score");
      const chainMsg = document.getElementById("chain-msg");
      const overlay = document.getElementById("overlay");
      const loginModal = document.getElementById("login-modal");
      const startModal = document.getElementById("start-modal");
      const rankModal = document.getElementById("rank-modal");

      const ROWS = 12,
        COLS = 6,
        SIZE = 40;
      const COLORS = [
        null,
        "#ef4444",
        "#22c55e",
        "#3b82f6",
        "#eab308",
        "#a855f7",
      ];

      let board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
      let score = 0,
        activePuyo = null,
        nextPuyo = null,
        isProcessing = false;
      let isPaused = false,
        gameRunning = false,
        waitingForStart = true;
      let playerName = "",
        playerPass = "";

      let lockTimer = 0;
      const LOCK_DELAY = 35;
      let fallCounter = 0;
      const FALL_SPEED = 40;

      class PuyoPair {
        constructor() {
          this.x = 2;
          this.y = 0;
          this.rot = 0;
          this.c1 = Math.floor(Math.random() * 5) + 1;
          this.c2 = Math.floor(Math.random() * 5) + 1;
        }
        getPos() {
          const pos = [{ x: this.x, y: this.y, c: this.c1 }];
          const ox = [0, 1, 0, -1][this.rot],
            oy = [-1, 0, 1, 0][this.rot];
          pos.push({ x: this.x + ox, y: this.y + oy, c: this.c2 });
          return pos;
        }
      }

      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        board.forEach((row, y) =>
          row.forEach((val, x) => {
            if (val) drawUnit(ctx, x, y, val, SIZE);
          }),
        );
        if (board[0][2] === 0) drawXMark(2, 0);
        if (activePuyo)
          activePuyo
            .getPos()
            .forEach((p) => drawUnit(ctx, p.x, p.y, p.c, SIZE));
        if (isPaused) {
          ctx.fillStyle = "rgba(0,0,0,0.6)";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = "white";
          ctx.font = "bold 24px sans-serif";
          ctx.textAlign = "center";
          ctx.fillText("PAUSED", canvas.width / 2, 240);
        }
        drawNext();
      }

      function drawNext() {
        nextCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
        if (nextPuyo) {
          drawUnit(nextCtx, 0.25, 1.7, nextPuyo.c1, 25);
          drawUnit(nextCtx, 0.25, 0.7, nextPuyo.c2, 25);
        }
      }

      function drawUnit(targetCtx, x, y, colorIndex, size) {
        const px = x * size + size / 2;
        const py = y * size + size / 2;
        const r = size * 0.45;
        targetCtx.fillStyle = COLORS[colorIndex];
        targetCtx.beginPath();
        targetCtx.arc(px, py, r, 0, Math.PI * 2);
        targetCtx.fill();
        targetCtx.fillStyle = "rgba(255,255,255,0.4)";
        targetCtx.beginPath();
        targetCtx.arc(px - r / 3, py - r / 3, r / 4, 0, Math.PI * 2);
        targetCtx.fill();
        targetCtx.fillStyle = "white";
        targetCtx.beginPath();
        targetCtx.arc(px - r / 3, py, r / 4, 0, Math.PI * 2);
        targetCtx.arc(px + r / 3, py, r / 4, 0, Math.PI * 2);
        targetCtx.fill();
        targetCtx.fillStyle = "black";
        targetCtx.beginPath();
        targetCtx.arc(px - r / 3, py, r / 8, 0, Math.PI * 2);
        targetCtx.arc(px + r / 3, py, r / 8, 0, Math.PI * 2);
        targetCtx.fill();
      }

      function drawXMark(x, y) {
        const m = 12;
        ctx.strokeStyle = "#ef4444";
        ctx.lineWidth = 4;
        ctx.lineCap = "round";
        ctx.beginPath();
        ctx.moveTo(x * SIZE + m, y * SIZE + m);
        ctx.lineTo(x * SIZE + SIZE - m, y * SIZE + SIZE - m);
        ctx.moveTo(x * SIZE + SIZE - m, y * SIZE + m);
        ctx.lineTo(x * SIZE + m, y * SIZE + SIZE - m);
        ctx.stroke();
      }

      async function gameLoop() {
        if (!gameRunning || waitingForStart) return;

        if (!isProcessing && !isPaused) {
          if (!activePuyo) {
            activePuyo = nextPuyo || new PuyoPair();
            nextPuyo = new PuyoPair();
            if (checkCollision(activePuyo)) {
              gameRunning = false;
              saveScore(score);
              alert(`GAME OVER!\nScore: ${score}`);
              showRanking();
              return;
            }
          }
          fallCounter++;
          const canMoveDown = canMove(activePuyo, 0, 1);
          if (canMoveDown) {
            lockTimer = 0;
            if (fallCounter >= FALL_SPEED) {
              activePuyo.y++;
              fallCounter = 0;
            }
          } else {
            lockTimer++;
            if (lockTimer >= LOCK_DELAY) {
              lockPuyo();
              activePuyo = null;
              lockTimer = 0;
              isProcessing = true;
              await handleChain();
              isProcessing = false;
            }
          }
        }
        draw();
        requestAnimationFrame(gameLoop);
      }

      async function handleChain() {
        let chainCount = 0;
        while (true) {
          await applyGravityAnimated();
          const matches = findMatches();
          if (matches.length === 0) {
            if (
              board.every((row) => row.every((cell) => cell === 0)) &&
              chainCount > 0
            ) {
              score += 2100;
              scoreElement.innerText = score;
              showChainMsg("ALL CLEAR!");
            }
            break;
          }
          chainCount++;
          score += matches.length * 10 * chainCount;
          scoreElement.innerText = score;
          showChainMsg(chainCount > 1 ? `${chainCount} CHAIN!` : "HIT!");
          matches.forEach((p) => (board[p.y][p.x] = 0));
          draw();
          await new Promise((r) => setTimeout(r, 300));
        }
      }

      async function applyGravityAnimated() {
        let changed = true;
        while (changed) {
          changed = false;
          for (let x = 0; x < COLS; x++) {
            for (let y = ROWS - 2; y >= 0; y--) {
              if (board[y][x] !== 0 && board[y + 1][x] === 0) {
                board[y + 1][x] = board[y][x];
                board[y][x] = 0;
                changed = true;
              }
            }
          }
          if (changed) {
            draw();
            await new Promise((r) => setTimeout(r, 50));
          }
        }
      }

      function canMove(puyo, dx, dy) {
        const testPuyo = {
          x: puyo.x + dx,
          y: puyo.y + dy,
          rot: puyo.rot,
          getPos: puyo.getPos,
        };
        return !checkCollision(testPuyo);
      }

      function move(dx, dy) {
        if (!activePuyo || isProcessing || isPaused || waitingForStart)
          return false;
        activePuyo.x += dx;
        activePuyo.y += dy;
        if (checkCollision(activePuyo)) {
          activePuyo.x -= dx;
          activePuyo.y -= dy;
          return false;
        }
        if (dy === 0) lockTimer = 0;
        return true;
      }

      function rotate() {
        if (!activePuyo || isProcessing || isPaused || waitingForStart) return;
        const oldRot = activePuyo.rot;
        activePuyo.rot = (activePuyo.rot + 1) % 4;
        if (checkCollision(activePuyo)) {
          activePuyo.x++;
          if (checkCollision(activePuyo)) {
            activePuyo.x -= 2;
            if (checkCollision(activePuyo)) {
              activePuyo.x++;
              activePuyo.rot = oldRot;
              return;
            }
          }
        }
        lockTimer = 0;
      }

      function checkCollision(p) {
        return p
          .getPos()
          .some(
            (pos) =>
              pos.x < 0 ||
              pos.x >= COLS ||
              pos.y >= ROWS ||
              (pos.y >= 0 && board[pos.y][pos.x] !== 0),
          );
      }

      function lockPuyo() {
        activePuyo.getPos().forEach((p) => {
          if (p.y >= 0) board[p.y][p.x] = p.c;
        });
      }

      function findMatches() {
        let matchedCells = [];
        let visited = Array.from({ length: ROWS }, () =>
          Array(COLS).fill(false),
        );
        for (let y = 0; y < ROWS; y++) {
          for (let x = 0; x < COLS; x++) {
            if (board[y][x] !== 0 && !visited[y][x]) {
              let group = [],
                color = board[y][x],
                stack = [{ x, y }];
              while (stack.length) {
                let c = stack.pop();
                if (
                  c.x < 0 ||
                  c.x >= COLS ||
                  c.y < 0 ||
                  c.y >= ROWS ||
                  visited[c.y][c.x] ||
                  board[c.y][c.x] !== color
                )
                  continue;
                visited[c.y][c.x] = true;
                group.push(c);
                stack.push(
                  { x: c.x + 1, y: c.y },
                  { x: c.x - 1, y: c.y },
                  { x: c.x, y: c.y + 1 },
                  { x: c.x, y: c.y - 1 },
                );
              }
              if (group.length >= 4) matchedCells.push(...group);
            }
          }
        }
        return matchedCells;
      }

      let moveRepeatTimer = null;
      function startMove(dx, dy) {
        if (!gameRunning || isPaused || isProcessing || waitingForStart) return;
        move(dx, dy);
        draw();
        clearInterval(moveRepeatTimer);
        moveRepeatTimer = setInterval(() => {
          move(dx, dy);
          draw();
        }, 120);
      }
      function stopMove() {
        clearInterval(moveRepeatTimer);
      }

      const addLongPress = (id, action) => {
        const el = document.getElementById(id);
        el.addEventListener("pointerdown", (e) => {
          e.preventDefault();
          action();
        });
        el.addEventListener("pointerup", stopMove);
        el.addEventListener("pointerleave", stopMove);
      };

      addLongPress("m-left", () => startMove(-1, 0));
      addLongPress("m-right", () => startMove(1, 0));
      document.getElementById("m-rotate").onclick = () => {
        rotate();
        draw();
      };
      document.getElementById("m-down").onclick = () => {
        if (!isProcessing && !isPaused && activePuyo) {
          while (canMove(activePuyo, 0, 1)) {
            activePuyo.y++;
          }
          lockTimer = LOCK_DELAY;
        }
      };

      function saveScore(s) {
        if (!playerPass) return;
        let data = JSON.parse(
          localStorage.getItem("puyoData") || '{"scores":[]}',
        );
        const userIndex = data.scores.findIndex((u) => u.pass === playerPass);
        if (userIndex !== -1) {
          data.scores[userIndex].name = playerName;
          if (s > data.scores[userIndex].score)
            data.scores[userIndex].score = s;
        } else {
          data.scores.push({ name: playerName, pass: playerPass, score: s });
        }
        localStorage.setItem("puyoData", JSON.stringify(data));
      }

      function showRanking() {
        const data = JSON.parse(
          localStorage.getItem("puyoData") || '{"scores":[]}',
        );
        let list = [...data.scores]
          .sort((a, b) => b.score - a.score)
          .slice(0, 10);
        let html = "<table><tr><th>#</th><th>Name</th><th>Score</th></tr>";
        list.forEach((s, i) => {
          html += `<tr class="${s.pass === playerPass ? "highlight" : ""}"><td>${i + 1}</td><td>${s.name}</td><td>${s.score}</td></tr>`;
        });
        document.getElementById("rank-list").innerHTML = html + "</table>";
        overlay.classList.remove("hidden");
        loginModal.classList.add("hidden");
        startModal.classList.add("hidden");
        rankModal.classList.remove("hidden");
      }

      function showChainMsg(txt) {
        chainMsg.innerText = txt;
        setTimeout(() => {
          if (chainMsg.innerText === txt) chainMsg.innerText = "";
        }, 1000);
      }

      // ログイン処理
      document.getElementById("loginBtn").onclick = () => {
        playerName = document.getElementById("nickname").value.trim();
        playerPass = document.getElementById("userPass").value.trim();
        if (!playerName || !playerPass) return alert("入力してください");
        document.getElementById("player-display").innerText =
          `PLAYER: ${playerName}`;
        showStartScreen();
      };

      // スタート画面の表示
      function showStartScreen() {
        overlay.classList.remove("hidden");
        loginModal.classList.add("hidden");
        rankModal.classList.add("hidden");
        startModal.classList.remove("hidden");
        waitingForStart = true;
      }

      // ゲーム開始ボタンの処理
      document.getElementById("playBtn").onclick = () => {
        overlay.classList.add("hidden");
        startModal.classList.add("hidden");
        waitingForStart = false;
        gameRunning = true;
        gameLoop(); // ループ開始
      };

      document.getElementById("showRankBtn").onclick = showRanking;
      document.getElementById("backBtn").onclick = () => showStartScreen();
      document.getElementById("pauseBtn").onclick = () => {
        isPaused = !isPaused;
        draw();
      };

      // リセットボタン：ログインは保持してスタート画面に戻る
      document.getElementById("resetBtn").onclick = () => {
        resetGame();
        showStartScreen();
        draw();
      };

      function resetGame() {
        board = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
        score = 0;
        scoreElement.innerText = "0";
        activePuyo = null;
        nextPuyo = new PuyoPair();
        gameRunning = false;
        isProcessing = false;
        isPaused = false;
        chainMsg.innerText = "";
      }

      window.addEventListener("keydown", (e) => {
        if (!gameRunning || isPaused || isProcessing || waitingForStart) return;
        if (e.key === "ArrowLeft") move(-1, 0);
        if (e.key === "ArrowRight") move(1, 0);
        if (e.key === "ArrowDown") move(0, 1);
        if (e.key === "ArrowUp") rotate();
        if (e.key === " ") {
          if (activePuyo) {
            while (canMove(activePuyo, 0, 1)) {
              activePuyo.y++;
            }
            lockTimer = LOCK_DELAY;
          }
        }
        draw();
      });

      draw();
    </script>
  </body>
</html>
